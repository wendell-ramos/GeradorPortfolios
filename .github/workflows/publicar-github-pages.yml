name: Publicar no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publicar:
    environment:
      name: github-pages
      url: ${{ steps.publicacao.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar a aplicacao
        run: npm run build

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar os arquivos publicados
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publicar o site
        id: publicacao
        uses: actions/deploy-pages@v4
